name: 2dfan Task Runner

# 需要写权限以便提交文件
permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    # - cron: '0 19 * * *'  # UTC时间19点对应北京时间3点.
    - cron: '0 22 * * *'  # UTC时间22点对应北京时间6点.
  workflow_dispatch: # 手动触发

jobs:
  run-task:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0   # 为了安全的 pull/commit/push，拉取完整历史

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libx11-dev xauth fonts-noto-cjk  # 安装中文字体
        pip install -r requirements.txt

    - name: Start Xvfb
      run: |
        nohup Xvfb :99 -screen 0 1280x1024x24 &

    - name: Set DISPLAY and XAUTHORITY environment variables
      run: |
        echo "DISPLAY=:99" >> $GITHUB_ENV
        echo "XAUTHORITY=/home/runner/.Xauthority" >> $GITHUB_ENV
        touch /home/runner/.Xauthority  # 创建一个空的 Xauthority 文件

    - name: Run Python script
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        LOGIN_URL: ${{ secrets.LOGIN_URL }}
      run: |
        python 2dfan_DrissionPage.py

    - name: Check for failure
      if: always()  # 确保此步骤无论之前是否失败都运行
      run: |
        if [ -f "./failure_flag.txt" ]; then
          echo "Sign-in failed, sending email notification..."
          # failure_flag.txt 可由脚本写入失败原因
          exit 1
        else
          echo "Sign-in succeeded."
        fi

    # ---- 新增：把结果追加到仓库文件并提交 ----
    - name: Save sign-in result to repo and commit
      if: always()   # 无论前面的步骤成功失败都要把结果写回仓库
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_REF: ${{ github.ref }}
      run: |
        set -e

        # 结果文件
        RESULT_FILE="results/signin_results.txt"
        mkdir -p "$(dirname "$RESULT_FILE")"

        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%SZ")
        if [ -f "./failure_flag.txt" ]; then
          STATUS="FAILURE"
          DETAILS=$(cat failure_flag.txt 2>/dev/null || echo "Sign-in failed")
        else
          STATUS="SUCCESS"
          DETAILS="Signed in successfully"
        fi

        # 将本次结果追加到文件（保留之前内容）
        echo "[$TIMESTAMP] $STATUS - $DETAILS" >> "$RESULT_FILE"

        # 如果你想记录更多（例如截屏路径或日志），可以把这些信息也 echo 到 RESULT_FILE

        # 配置 Git 提交信息
        git config user.name "${GITHUB_ACTOR}"
        git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

        # 尝试 pull 最新变更以减少冲突（并忽略失败）
        BRANCH=${GITHUB_REF#refs/heads/}
        git pull --rebase origin "$BRANCH" || true

        git add "$RESULT_FILE"
        # 仅当有改动时再 commit，否则跳过
        if git diff --cached --quiet; then
          echo "No changes to commit for $RESULT_FILE"
        else
          git commit -m "Update sign-in result: $TIMESTAMP"
          git push origin "$BRANCH"
        fi
